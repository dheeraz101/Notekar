<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000" id="theme-meta">
<meta name="description" content="Instant timestamp logger — one tap, one moment saved.">
<title>Moment</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/dexie@3/dist/dexie.min.js"></script>
<style>
/* ─────────────────────────────────────────
   TOKENS
───────────────────────────────────────── */
:root {
  --bg:          #000000;
  --bg2:         #0a0a0a;
  --surf:        rgba(28,28,30,0.95);
  --surf2:       rgba(44,44,46,0.96);
  --surf3:       rgba(60,60,62,0.98);
  --border:      rgba(255,255,255,0.08);
  --border2:     rgba(255,255,255,0.13);
  --text:        rgba(255,255,255,0.90);
  --text2:       rgba(255,255,255,0.50);
  --text3:       rgba(255,255,255,0.25);
  --clock-col:   rgba(255,255,255,0.17);
  --accent:      #0A84FF;
  --accent-bg:   rgba(10,132,255,0.15);
  --green:       #30D158;
  --green-bg:    rgba(48,209,88,0.14);
  --orange:      #FF9F0A;
  --orange-bg:   rgba(255,159,10,0.14);
  --red:         #FF453A;
  --red-bg:      rgba(255,69,58,0.12);
  --blur:        blur(28px) saturate(180%);
  --r-s: 10px; --r-m: 16px; --r-l: 22px; --r-pill: 9999px;
  --ease: cubic-bezier(0.22,0.61,0.36,1);
  --ease2: cubic-bezier(0.16,1,0.3,1);
  --st: env(safe-area-inset-top,0px);
  --sb: env(safe-area-inset-bottom,0px);
  --font: 'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
}
[data-theme="light"] {
  --bg: #F2F2F7; --bg2: #E5E5EA;
  --surf: rgba(255,255,255,0.93); --surf2: rgba(242,242,247,0.96); --surf3: rgba(229,229,234,0.98);
  --border: rgba(0,0,0,0.06); --border2: rgba(0,0,0,0.11);
  --text: rgba(0,0,0,0.88); --text2: rgba(0,0,0,0.46); --text3: rgba(0,0,0,0.22);
  --clock-col: rgba(0,0,0,0.13);
  --accent: #007AFF; --accent-bg: rgba(0,122,255,0.12);
  --green: #34C759; --green-bg: rgba(52,199,89,0.12);
  --orange: #FF9500; --orange-bg: rgba(255,149,0,0.12);
  --red: #FF3B30; --red-bg: rgba(255,59,48,0.10);
}
[data-theme="amoled"] {
  --bg: #000000; --bg2: #000000;
  --surf: rgba(12,12,12,0.97); --surf2: rgba(20,20,20,0.98); --surf3: rgba(30,30,30,0.99);
}

/* ─────────────────────────────────────────
   RESET
───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;-webkit-text-size-adjust:none;height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;position:fixed;inset:0;width:100%;transition:background 0.3s ease;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
button{cursor:pointer;background:none;border:none;font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent;}
input{font-family:inherit;-webkit-user-select:text;user-select:text;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

/* ─────────────────────────────────────────
   GLASS UTILITY
───────────────────────────────────────── */
.glass{background:var(--surf);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);}
.glass2{background:var(--surf2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);}

/* ─────────────────────────────────────────
   MAIN SCREEN
───────────────────────────────────────── */
#screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding-top:var(--st);
  padding-bottom:calc(var(--sb) + 100px);
  z-index:1;
  pointer-events:none;
}
#clock-wrap{text-align:center;pointer-events:none;line-height:1;}
#clock-hm{
  display:inline;
  font-size:clamp(5rem,23vw,9rem);
  font-weight:200;
  letter-spacing:-0.04em;
  color:var(--clock-col);
  font-variant-numeric:tabular-nums;
  transition:color 0.3s ease;
}
#clock-sec{
  display:inline;
  font-size:clamp(1.8rem,8vw,3.5rem);
  font-weight:200;
  letter-spacing:-0.02em;
  color:var(--text3);
  font-variant-numeric:tabular-nums;
}

/* ─────────────────────────────────────────
   RIPPLE
───────────────────────────────────────── */
@keyframes rpl{from{transform:scale(0);opacity:.45;}to{transform:scale(7);opacity:0;}}
.rpl-el{position:fixed;width:50px;height:50px;border-radius:50%;background:var(--accent-bg);pointer-events:none;animation:rpl 600ms var(--ease) forwards;z-index:2;}

/* ─────────────────────────────────────────
   TAP ZONE — lowest interactive layer
───────────────────────────────────────── */
#tap-zone{
  position:fixed;inset:0;
  z-index:3;
  /* leaves room for toolbar at bottom */
  bottom:calc(var(--sb) + 88px);
}

/* ─────────────────────────────────────────
   TOP TOAST (mode notification)
───────────────────────────────────────── */
#mode-toast{
  position:fixed;
  top:calc(var(--st) + 14px);
  left:50%;transform:translateX(-50%) translateY(-20px);
  opacity:0;pointer-events:none;
  z-index:999;
  transition:transform 0.28s var(--ease),opacity 0.28s ease;
  white-space:nowrap;
}
#mode-toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
#mode-toast-inner{
  display:flex;align-items:center;gap:8px;
  padding:9px 16px;border-radius:var(--r-pill);
  font-size:13px;font-weight:500;letter-spacing:-.01em;
}

/* ─────────────────────────────────────────
   UNDO TOAST
───────────────────────────────────────── */
#undo-toast{
  position:fixed;
  bottom:calc(var(--sb) + 106px);
  left:50%;transform:translateX(-50%) translateY(10px);
  opacity:0;pointer-events:none;
  z-index:998;
  transition:transform 0.26s var(--ease),opacity 0.26s ease;
  white-space:nowrap;
}
#undo-toast.on{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto;}
#undo-inner{display:flex;align-items:center;gap:10px;padding:10px 12px 10px 16px;border-radius:var(--r-pill);}
#undo-inner span{font-size:13px;color:var(--text);}
#btn-undo{font-size:13px;font-weight:600;color:var(--accent);padding:5px 12px;border-radius:var(--r-pill);background:var(--accent-bg);transition:opacity .15s;}
#btn-undo:active{opacity:.6;}

/* ─────────────────────────────────────────
   TOOLBAR — sits above tap-zone
───────────────────────────────────────── */
#toolbar{
  position:fixed;
  bottom:calc(var(--sb) + 14px);
  left:50%;transform:translateX(-50%);
  z-index:200;
  display:flex;align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:var(--r-pill);
  box-shadow:0 8px 32px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3);
  /* min-width so it's stable */
  min-width:220px;
  max-width:calc(100vw - 32px);
}

/* Icon-only toolbar button */
.tb-icon{
  width:46px;height:46px;
  border-radius:var(--r-pill);
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);
  flex-shrink:0;
  transition:color .15s ease,background .15s ease,transform .15s var(--ease);
  -webkit-tap-highlight-color:transparent;
  position:relative;z-index:1;
}
.tb-icon svg{width:21px;height:21px;pointer-events:none;}
.tb-icon:active{transform:scale(0.86);background:var(--surf3);color:var(--text);}

/* History pill — middle, stretches */
#btn-history{
  flex:1;
  height:46px;
  border-radius:var(--r-pill);
  display:flex;align-items:center;justify-content:center;
  gap:7px;
  color:var(--text2);
  font-size:13px;font-weight:500;letter-spacing:-.01em;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  transition:color .15s ease,background .15s ease,transform .15s var(--ease);
  -webkit-tap-highlight-color:transparent;
  position:relative;z-index:1;
  min-width:0;
}
[data-theme="light"] #btn-history{background:rgba(0,0,0,.04);}
#btn-history svg{width:16px;height:16px;flex-shrink:0;opacity:.65;pointer-events:none;}
#btn-history:active{transform:scale(0.95);background:var(--surf3);color:var(--text);}

/* ─────────────────────────────────────────
   POPUP SYSTEM (reusable)
───────────────────────────────────────── */
.popup{
  position:fixed;inset:0;
  z-index:400;
  display:flex;flex-direction:column;justify-content:flex-end;
  pointer-events:none;
  /* NOT display:none — use opacity+pointer-events for GPU compositing */
}
.popup.open{pointer-events:auto;}

.pop-bg{
  position:absolute;inset:0;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);
  transition:background .28s ease,backdrop-filter .28s ease,-webkit-backdrop-filter .28s ease;
}
.popup.open .pop-bg{background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}

.pop-sheet{
  position:relative;z-index:1;
  border-radius:var(--r-l) var(--r-l) 0 0;
  overflow:hidden;
  transform:translateY(102%);
  transition:transform .38s var(--ease2);
  padding-bottom:calc(var(--sb) + 12px);
  max-height:88dvh;
  display:flex;flex-direction:column;
  box-shadow:0 -2px 40px rgba(0,0,0,.6);
}
.popup.open .pop-sheet{transform:translateY(0);}

/* drag handle */
.dh{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 0;flex-shrink:0;}

/* popup header */
.ph{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;flex-shrink:0;}
.ph-title{font-size:17px;font-weight:600;letter-spacing:-.02em;color:var(--text);}
.ph-close{
  width:28px;height:28px;border-radius:var(--r-pill);
  background:var(--surf3);
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);flex-shrink:0;
  transition:opacity .15s,transform .15s var(--ease);
}
.ph-close:active{opacity:.6;transform:scale(.88);}
.ph-close svg{width:13px;height:13px;pointer-events:none;}

/* ─────────────────────────────────────────
   HISTORY POPUP
───────────────────────────────────────── */
#popup-history .pop-sheet{min-height:55dvh;}

/* filter chips */
.chips{display:flex;gap:6px;padding:4px 16px 12px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  padding:5px 13px;border-radius:var(--r-pill);
  font-size:12px;font-weight:500;
  color:var(--text2);background:var(--surf3);border:1px solid var(--border);
  white-space:nowrap;flex-shrink:0;
  transition:color .15s,background .15s;
}
.chip.on{color:var(--accent);background:var(--accent-bg);border-color:transparent;}
.chip:active{opacity:.7;}

/* history list */
#hist-list{
  flex:1;overflow-y:auto;
  padding:0 14px 8px;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}
#hist-list::-webkit-scrollbar{display:none;}
.dg{margin-bottom:18px;}
.dg-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:0 4px;margin-bottom:6px;}
.ei{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:var(--r-s);margin-bottom:2px;
  transition:background .12s;
  position:relative;
}
.ei:active{background:var(--surf3);}
.edot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.edot.in{background:var(--green);box-shadow:0 0 6px rgba(48,209,88,.4);}
.edot.out{background:var(--orange);box-shadow:0 0 6px rgba(255,159,10,.4);}
.edot.single{background:var(--accent);box-shadow:0 0 5px rgba(10,132,255,.35);}
.etime{font-size:15px;font-weight:400;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:-.01em;flex:1;}
.ebadge{font-size:10px;font-weight:600;letter-spacing:.04em;padding:2px 7px;border-radius:var(--r-pill);}
.ebadge.in{color:var(--green);background:var(--green-bg);}
.ebadge.out{color:var(--orange);background:var(--orange-bg);}
.enote{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;-webkit-user-select:text;user-select:text;max-width:100%;}
.edel{
  width:26px;height:26px;border-radius:var(--r-pill);
  display:flex;align-items:center;justify-content:center;
  color:var(--red);background:var(--red-bg);
  font-size:16px;opacity:0;flex-shrink:0;
  transition:opacity .15s,transform .15s;
}
.ei:hover .edel,.ei:focus-within .edel{opacity:.75;}
.edel:active{opacity:1!important;transform:scale(.88);}
.hempty{text-align:center;padding:56px 28px;color:var(--text3);font-size:14px;line-height:1.65;}
.hempty-ico{font-size:38px;margin-bottom:10px;opacity:.35;}

/* ─────────────────────────────────────────
   SETTINGS POPUP
───────────────────────────────────────── */
#popup-settings .pop-sheet{min-height:50dvh;}
.sbody{flex:1;overflow-y:auto;padding:0 16px 4px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
.sbody::-webkit-scrollbar{display:none;}
.slabel{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:0 4px;margin:14px 0 6px;}
.slabel:first-child{margin-top:4px;}
.scard{border-radius:var(--r-m);overflow:hidden;background:var(--surf2);border:1px solid var(--border);margin-bottom:4px;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;min-height:50px;transition:background .12s;cursor:pointer;}
.srow+.srow{border-top:1px solid var(--border);}
.srow:active{background:var(--surf3);}
.srow-l{display:flex;align-items:center;gap:11px;flex:1;pointer-events:none;}
.srow-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.srow-ico svg{pointer-events:none;}
.srow-t{font-size:15px;color:var(--text);}
.srow-s{font-size:12px;color:var(--text2);margin-top:1px;}
.srow-chev{color:var(--text3);flex-shrink:0;pointer-events:none;}
.srow-chev svg{width:14px;height:14px;}

/* theme grid */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;}
.tbtn{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:14px 8px;border-radius:var(--r-s);
  background:var(--surf3);border:2px solid transparent;
  transition:border-color .15s,transform .15s var(--ease);
  cursor:pointer;
}
.tbtn.on{border-color:var(--accent);}
.tbtn:active{transform:scale(.94);}
.tswatch{width:34px;height:34px;border-radius:50%;flex-shrink:0;}
.sw-dark{background:#1C1C1E;border:2px solid rgba(255,255,255,.12);}
.sw-light{background:#F2F2F7;border:2px solid rgba(0,0,0,.1);}
.sw-amoled{background:#000;border:2px solid rgba(255,255,255,.2);}
.tlbl{font-size:11px;font-weight:500;color:var(--text2);}

/* danger button */
.danger-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;
  border-radius:var(--r-m);background:var(--red-bg);border:1px solid rgba(255,69,58,.2);
  color:var(--red);font-size:15px;font-weight:500;
  transition:opacity .15s,transform .15s;margin-top:4px;
}
.danger-btn:active{opacity:.7;transform:scale(.98);}

/* about */
.about{text-align:center;padding:22px 16px 6px;}
.about-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;}
.about-ver{font-size:12px;color:var(--text3);margin-bottom:8px;}
.about-desc{font-size:13px;color:var(--text2);line-height:1.6;max-width:280px;margin:0 auto;}

/* ─────────────────────────────────────────
   NOTE POPUP
───────────────────────────────────────── */
.note-body{padding:4px 18px 18px;}
.note-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
#note-input{
  width:100%;background:var(--surf3);
  border:1px solid var(--border2);border-radius:var(--r-s);
  padding:12px 14px;font-size:16px;color:var(--text);
  outline:none;transition:border-color .15s;
}
#note-input:focus{border-color:var(--accent);}
#note-input::placeholder{color:var(--text3);}
.note-acts{display:flex;gap:10px;margin-top:13px;}
.nbtn{flex:1;padding:13px;border-radius:var(--r-s);font-size:15px;font-weight:500;transition:opacity .15s,transform .15s;}
.nbtn:active{opacity:.7;transform:scale(.97);}
.nbtn-skip{background:var(--surf3);border:1px solid var(--border);color:var(--text2);}
.nbtn-save{background:var(--accent);color:#fff;font-weight:600;}

/* ─────────────────────────────────────────
   RESPONSIVE — bigger on wide screens
───────────────────────────────────────── */
@media(min-width:540px){
  .pop-sheet{max-width:460px;margin:0 auto;border-radius:var(--r-l);margin-bottom:0;}
  .popup{align-items:center;}
  #toolbar{gap:10px;}
  .tb-icon{width:50px;height:50px;}
  .tb-icon svg{width:23px;height:23px;}
  #btn-history{height:50px;font-size:14px;}
}
@media(min-width:768px){
  #clock-hm{font-size:clamp(7rem,14vw,11rem);}
  .pop-sheet{max-width:500px;}
}
</style>
</head>
<body>

<!-- ══════ SCREEN ══════ -->
<div id="screen">
  <div id="clock-wrap">
    <span id="clock-hm">00:00</span><span id="clock-sec">.00</span>
  </div>
</div>

<!-- ══════ TAP ZONE (z=3, below toolbar at z=200) ══════ -->
<div id="tap-zone"></div>

<!-- ══════ MODE TOAST (top) ══════ -->
<div id="mode-toast" role="status" aria-live="polite">
  <div id="mode-toast-inner" class="glass2"></div>
</div>

<!-- ══════ UNDO TOAST ══════ -->
<div id="undo-toast">
  <div id="undo-inner" class="glass">
    <span>Moment saved</span>
    <button id="btn-undo" type="button">Undo</button>
  </div>
</div>

<!-- ══════ TOOLBAR (z=200, always on top) ══════ -->
<div id="toolbar" class="glass">

  <!-- 1. Mode icon button -->
  <button class="tb-icon" id="btn-mode" type="button" aria-label="Toggle mode">
    <svg id="icon-mode" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
      <path d="M7 21l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
    </svg>
  </button>

  <!-- 2. History pill -->
  <button id="btn-history" type="button" aria-label="Open history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/>
    </svg>
    <span>History</span>
  </button>

  <!-- 3. Settings icon button -->
  <button class="tb-icon" id="btn-settings" type="button" aria-label="Open settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

</div>

<!-- ══════ HISTORY POPUP ══════ -->
<div class="popup" id="popup-history" role="dialog" aria-modal="true" aria-label="History">
  <div class="pop-bg" data-close="popup-history"></div>
  <div class="pop-sheet glass">
    <div class="dh"></div>
    <div class="ph">
      <span class="ph-title">History</span>
      <button class="ph-close" data-close="popup-history" type="button" aria-label="Close history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="chips" id="filter-row" role="group" aria-label="Filter">
      <button class="chip on" data-filter="all" type="button">All</button>
      <button class="chip" data-filter="today" type="button">Today</button>
      <button class="chip" data-filter="week" type="button">This Week</button>
      <button class="chip" data-filter="in" type="button">IN</button>
      <button class="chip" data-filter="out" type="button">OUT</button>
      <button class="chip" data-filter="notes" type="button">Notes</button>
    </div>
    <div id="hist-list" role="list">
      <div class="hempty"><div class="hempty-ico">◷</div>No moments yet.<br>Tap the screen to log one.</div>
    </div>
  </div>
</div>

<!-- ══════ SETTINGS POPUP ══════ -->
<div class="popup" id="popup-settings" role="dialog" aria-modal="true" aria-label="Settings">
  <div class="pop-bg" data-close="popup-settings"></div>
  <div class="pop-sheet glass">
    <div class="dh"></div>
    <div class="ph">
      <span class="ph-title">Settings</span>
      <button class="ph-close" data-close="popup-settings" type="button" aria-label="Close settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sbody">

      <div class="slabel">Appearance</div>
      <div class="scard">
        <div class="tgrid">
          <button class="tbtn on" data-theme-set="dark" type="button" aria-label="Dark theme">
            <div class="tswatch sw-dark"></div><span class="tlbl">Dark</span>
          </button>
          <button class="tbtn" data-theme-set="light" type="button" aria-label="Light theme">
            <div class="tswatch sw-light"></div><span class="tlbl">Light</span>
          </button>
          <button class="tbtn" data-theme-set="amoled" type="button" aria-label="AMOLED theme">
            <div class="tswatch sw-amoled"></div><span class="tlbl">AMOLED</span>
          </button>
        </div>
      </div>

      <div class="slabel">Export</div>
      <div class="scard">
        <div class="srow" id="btn-csv" role="button" tabindex="0">
          <div class="srow-l">
            <div class="srow-ico" style="background:var(--green-bg)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div><div class="srow-t">Export CSV</div><div class="srow-s">Spreadsheet format</div></div>
          </div>
          <span class="srow-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
        <div class="srow" id="btn-json" role="button" tabindex="0">
          <div class="srow-l">
            <div class="srow-ico" style="background:var(--accent-bg)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            </div>
            <div><div class="srow-t">Export JSON</div><div class="srow-s">Developer format</div></div>
          </div>
          <span class="srow-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
        </div>
      </div>

      <div class="slabel">Stats</div>
      <div class="scard">
        <div class="srow" style="cursor:default;">
          <div class="srow-l">
            <div class="srow-ico" style="background:var(--orange-bg)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <div><div class="srow-t">All Moments</div><div class="srow-s" id="stats-line">Loading…</div></div>
          </div>
        </div>
      </div>

      <div style="height:8px"></div>
      <button class="danger-btn" id="btn-reset" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Reset All Data
      </button>

      <div class="about">
        <div class="about-name">Moment</div>
        <div class="about-ver">v2.0 · PWA</div>
        <div class="about-desc">A minimal timestamp logger. Tap to log. Long-press to add a note.</div>
      </div>
      <div style="height:4px"></div>
    </div>
  </div>
</div>

<!-- ══════ NOTE POPUP ══════ -->
<div class="popup" id="popup-note" role="dialog" aria-modal="true" aria-label="Add note">
  <div class="pop-bg" data-close="popup-note"></div>
  <div class="pop-sheet glass">
    <div class="dh"></div>
    <div class="ph">
      <span class="ph-title">Add Note</span>
      <button class="ph-close" data-close="popup-note" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="note-body">
      <div class="note-lbl">Optional note</div>
      <input type="text" id="note-input" placeholder="What's happening…" maxlength="120" autocomplete="off" autocorrect="on" spellcheck="true">
      <div class="note-acts">
        <button class="nbtn nbtn-skip" id="btn-skip" type="button">Skip</button>
        <button class="nbtn nbtn-save" id="btn-save-note" type="button">Save Moment</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════ DB ═══════
const db = new Dexie('MomentV2');
db.version(1).stores({ entries: '++id, timestamp, type, date' });

// ═══════ STATE ═══════
let mode        = localStorage.getItem('m-mode') || 'two-way';
let inout       = localStorage.getItem('m-inout') || 'in';
let theme       = localStorage.getItem('m-theme') || 'dark';
let sesStart    = parseInt(localStorage.getItem('m-ses') || '0') || null;
let lastId      = null;
let filter      = 'all';
let undoTimer   = null;
let modeTimer   = null;
let lpTimer     = null;
let lpFired     = false;
let anyPopupOpen = false;

// ═══════ INIT ═══════
applyTheme(theme, false);
updateModeIcon();
startClock();
updateStats();

// ═══════ CLOCK ═══════
function startClock() {
  const hm  = document.getElementById('clock-hm');
  const sec = document.getElementById('clock-sec');
  function tick() {
    const n = new Date();
    hm.textContent  = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    sec.textContent = '.' + String(n.getSeconds()).padStart(2,'0');
  }
  tick();
  const delay = 1000 - (Date.now() % 1000);
  setTimeout(() => { tick(); setInterval(tick, 1000); }, delay);
}

// ═══════ THEME ═══════
function applyTheme(t, save=true) {
  theme = t;
  if (save) localStorage.setItem('m-theme', t);
  const html = document.documentElement;
  html.removeAttribute('data-theme');
  if (t === 'light')  html.setAttribute('data-theme','light');
  if (t === 'amoled') html.setAttribute('data-theme','amoled');
  document.getElementById('theme-meta').content = t === 'light' ? '#F2F2F7' : '#000000';
  document.querySelectorAll('[data-theme-set]').forEach(b => b.classList.toggle('on', b.dataset.themeSet === t));
}

// ═══════ MODE ═══════
function toggleMode() {
  mode = mode === 'two-way' ? 'single' : 'two-way';
  localStorage.setItem('m-mode', mode);
  if (mode === 'single') {
    inout = 'in'; sesStart = null;
    localStorage.removeItem('m-inout');
    localStorage.removeItem('m-ses');
  }
  updateModeIcon();
  showModeToast();
  haptic();
}

function updateModeIcon() {
  const ico = document.getElementById('icon-mode');
  const btn = document.getElementById('btn-mode');
  if (mode === 'two-way') {
    btn.style.color = '';
    ico.innerHTML = `<path d="M17 3l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 21l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>`;
  } else {
    btn.style.color = 'var(--accent)';
    ico.innerHTML = `<path d="M5 12h14"/><path d="M15 8l4 4-4 4"/><circle cx="12" cy="12" r="2.5" fill="currentColor" opacity=".4"/>`;
  }
}

function showModeToast() {
  const toast = document.getElementById('mode-toast');
  const inner = document.getElementById('mode-toast-inner');
  const label = mode === 'two-way' ? 'Two-Way Mode' : 'Single Mode';
  const col   = mode === 'two-way' ? 'var(--accent)' : 'var(--green)';
  const ico   = mode === 'two-way'
    ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round"><path d="M17 3l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 21l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`
    : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="M15 8l4 4-4 4"/></svg>`;
  inner.innerHTML = ico + `<span style="color:${col}">${label}</span>`;
  if (modeTimer) clearTimeout(modeTimer);
  toast.classList.add('on');
  modeTimer = setTimeout(() => toast.classList.remove('on'), 2200);
}

// ═══════ HAPTIC ═══════
function haptic(d=8) { if (navigator.vibrate) try { navigator.vibrate(d); } catch(e){} }

// ═══════ RIPPLE ═══════
function ripple(x,y) {
  const el = document.createElement('div');
  el.className = 'rpl-el';
  el.style.left = (x-25)+'px'; el.style.top = (y-25)+'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), {once:true});
}

// ═══════ LOG ENTRY ═══════
async function logEntry(note=null) {
  const now = new Date();
  let type = 'single';
  if (mode === 'two-way') {
    type = inout;
    if (inout === 'in') {
      sesStart = now.getTime();
      localStorage.setItem('m-ses', sesStart);
      inout = 'out';
    } else {
      sesStart = null;
      localStorage.removeItem('m-ses');
      inout = 'in';
    }
    localStorage.setItem('m-inout', inout);
  }
  try {
    const id = await db.entries.add({
      timestamp: now.getTime(), type, note: note||'',
      date: now.toISOString().split('T')[0]
    });
    lastId = id;
    haptic(); showUndo(); refreshIfOpen(); updateStats();
  } catch(e) { console.error(e); }
}

// ═══════ UNDO ═══════
function showUndo() {
  const t = document.getElementById('undo-toast');
  if (undoTimer) clearTimeout(undoTimer);
  t.classList.add('on');
  undoTimer = setTimeout(() => t.classList.remove('on'), 4500);
}

async function undoLast() {
  if (!lastId) return;
  try {
    const e = await db.entries.get(lastId);
    if (!e) return;
    await db.entries.delete(lastId);
    if (mode === 'two-way') {
      if (e.type === 'in') {
        inout = 'in'; sesStart = null; localStorage.removeItem('m-ses');
      } else {
        inout = 'out';
        const prev = await db.entries.where('type').equals('in').reverse().first();
        sesStart = prev ? prev.timestamp : null;
        if (sesStart) localStorage.setItem('m-ses', sesStart);
      }
      localStorage.setItem('m-inout', inout);
    }
    lastId = null;
    document.getElementById('undo-toast').classList.remove('on');
    if (undoTimer) clearTimeout(undoTimer);
    haptic(4); refreshIfOpen(); updateStats();
  } catch(e) { console.error(e); }
}
document.getElementById('btn-undo').addEventListener('click', e => { e.stopPropagation(); undoLast(); });

// ═══════ TAP ZONE ═══════
const tapZone = document.getElementById('tap-zone');

tapZone.addEventListener('pointerdown', e => {
  if (anyPopupOpen) return;
  lpFired = false;
  lpTimer = setTimeout(() => {
    lpFired = true;
    haptic(14);
    openPopup('popup-note');
    setTimeout(() => document.getElementById('note-input').focus(), 340);
  }, 450);
});

tapZone.addEventListener('pointermove', e => {
  if (lpTimer && !lpFired && (Math.abs(e.movementX)>8 || Math.abs(e.movementY)>8)) {
    clearTimeout(lpTimer); lpTimer = null;
  }
});

tapZone.addEventListener('pointerup', e => {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  if (lpFired || anyPopupOpen) return;
  ripple(e.clientX, e.clientY);
  logEntry();
});

tapZone.addEventListener('pointercancel', () => {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
});

// ═══════ POPUP ENGINE ═══════
function openPopup(id) {
  document.getElementById(id).classList.add('open');
  anyPopupOpen = true;
}

function closePopup(id) {
  document.getElementById(id).classList.remove('open');
  anyPopupOpen = document.querySelectorAll('.popup.open').length > 0;
}

// Delegate all [data-close] clicks
document.addEventListener('click', e => {
  const closer = e.target.closest('[data-close]');
  if (closer) {
    const id = closer.dataset.close;
    if (id === 'popup-note') closeNote(false);
    else closePopup(id);
  }
});

// Toolbar buttons
document.getElementById('btn-mode').addEventListener('click', toggleMode);
document.getElementById('btn-history').addEventListener('click', () => { openPopup('popup-history'); refreshHistory(); });
document.getElementById('btn-settings').addEventListener('click', () => { openPopup('popup-settings'); updateStats(); });

// Keyboard ESC
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  ['popup-note','popup-history','popup-settings'].forEach(id => {
    if (document.getElementById(id).classList.contains('open')) {
      if (id === 'popup-note') closeNote(false);
      else closePopup(id);
    }
  });
});

// ═══════ NOTE POPUP ═══════
function closeNote(save) {
  const val = document.getElementById('note-input').value.trim();
  document.getElementById('note-input').value = '';
  closePopup('popup-note');
  logEntry(save ? val : null);
}
document.getElementById('btn-save-note').addEventListener('click', () => closeNote(true));
document.getElementById('btn-skip').addEventListener('click', () => closeNote(false));
document.getElementById('note-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); closeNote(true); }
  if (e.key === 'Escape') closeNote(false);
});

// ═══════ HISTORY ═══════
function refreshIfOpen() {
  if (document.getElementById('popup-history').classList.contains('open')) refreshHistory();
}

async function refreshHistory() {
  const list = document.getElementById('hist-list');
  let rows = await db.entries.orderBy('timestamp').reverse().toArray();
  const today = new Date().toISOString().split('T')[0];
  const weekAgo = Date.now() - 7*24*60*60*1000;

  if (filter==='today')  rows = rows.filter(e => e.date===today);
  else if (filter==='week')   rows = rows.filter(e => e.timestamp>=weekAgo);
  else if (filter==='in')     rows = rows.filter(e => e.type==='in');
  else if (filter==='out')    rows = rows.filter(e => e.type==='out');
  else if (filter==='notes')  rows = rows.filter(e => e.note && e.note.length>0);

  if (!rows.length) {
    list.innerHTML = '<div class="hempty"><div class="hempty-ico">◷</div>No moments yet.<br>Tap the screen to log one.</div>';
    return;
  }

  const groups = {};
  rows.forEach(e => { if (!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });

  let html = '';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date => {
    const d = new Date(date+'T00:00:00');
    const lbl = date===today ? 'Today' : d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    html += `<div class="dg" role="listitem"><div class="dg-label">${esc(lbl)}</div>`;
    groups[date].forEach(e => {
      const t = new Date(e.timestamp);
      const ts = t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
      const dot = e.type==='in'?'in':e.type==='out'?'out':'single';
      const badge = (e.type==='in'||e.type==='out') ? `<span class="ebadge ${e.type}">${e.type.toUpperCase()}</span>` : '';
      html += `
        <div class="ei" role="listitem">
          <div class="edot ${dot}"></div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
              <span class="etime">${ts}</span>${badge}
            </div>
            ${e.note?`<div class="enote">${esc(e.note)}</div>`:''}
          </div>
          <button class="edel" data-del="${e.id}" type="button" aria-label="Delete entry">×</button>
        </div>`;
    });
    html += '</div>';
  });
  list.innerHTML = html;

  list.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', async ev => {
      ev.stopPropagation();
      const id = parseInt(btn.dataset.del);
      await db.entries.delete(id);
      if (lastId===id) lastId=null;
      haptic(4); refreshHistory(); updateStats();
    });
  });
}

document.getElementById('filter-row').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  filter = chip.dataset.filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c===chip));
  refreshHistory();
});

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ═══════ STATS ═══════
async function updateStats() {
  const el = document.getElementById('stats-line');
  if (!el) return;
  const total = await db.entries.count();
  const today = new Date().toISOString().split('T')[0];
  const todayN = await db.entries.where('date').equals(today).count();
  el.textContent = `${total} total · ${todayN} today`;
}

// ═══════ SETTINGS ACTIONS ═══════
document.querySelectorAll('[data-theme-set]').forEach(btn => {
  btn.addEventListener('click', () => { applyTheme(btn.dataset.themeSet); haptic(); });
});

document.getElementById('btn-csv').addEventListener('click', async () => {
  const rows = await db.entries.orderBy('timestamp').toArray();
  let csv = 'id,timestamp,iso,date,time,type,note\n';
  rows.forEach(e => {
    const iso = new Date(e.timestamp).toISOString();
    const t   = new Date(e.timestamp).toLocaleTimeString('en-US',{hour12:false});
    csv += `${e.id},${e.timestamp},"${iso}","${e.date}","${t}","${e.type}","${(e.note||'').replace(/"/g,'""')}"\n`;
  });
  dl('moments.csv', csv, 'text/csv');
  closePopup('popup-settings');
});

document.getElementById('btn-json').addEventListener('click', async () => {
  const rows = await db.entries.orderBy('timestamp').toArray();
  const data = rows.map(e => ({...e, iso:new Date(e.timestamp).toISOString()}));
  dl('moments.json', JSON.stringify(data,null,2), 'application/json');
  closePopup('popup-settings');
});

function dl(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(a.href); },100);
}

document.getElementById('btn-reset').addEventListener('click', async () => {
  if (!confirm('Delete all moments? This cannot be undone.')) return;
  await db.entries.clear();
  lastId=null; inout='in'; sesStart=null;
  localStorage.removeItem('m-inout'); localStorage.removeItem('m-ses');
  haptic(20); refreshIfOpen(); updateStats(); closePopup('popup-settings');
});
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
